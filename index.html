<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Neumorphic Calculator Light/Dark Themed</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class='calculator' id='calc'>
        <div class='toggle'>
            <div class='theme-switch-wrapper'>
                <label class='theme-switch' for='checkbox'>
                    <input id='checkbox' type='checkbox'>
                    <div class='slider round'></div>
                </label>
            </div>
        </div>
        <div class='display'></div>
        <button class='neumorphic c'>C</button>
        <button class='neumorphic signed'>+/-</button>
        <button class='neumorphic percent'>%</button>
        <button class='neumorphic divide'>÷</button>
        <button class='neumorphic seven'>7</button>
        <button class='neumorphic eight'>8</button>
        <button class='neumorphic nine'>9</button>
        <button class='neumorphic times'>x</button>
        <button class='neumorphic four'>4</button>
        <button class='neumorphic five'>5</button>
        <button class='neumorphic six'>6</button>
        <button class='neumorphic minus'>-</button>
        <button class='neumorphic one'>1</button>
        <button class='neumorphic two'>2</button>
        <button class='neumorphic three'>3</button>
        <button class='neumorphic plus'>+</button>
        <button class='neumorphic zero'>0</button>
        <button class='neumorphic decimal'>.</button>
        <button class='neumorphic equals'>=</button>
    </div>
    <script src="./script.js"></script>
</body>
</html>
